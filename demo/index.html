    <meta charset="UTF-8" />

    <meta name="color-scheme" content="light" />

    <!-- Favicons (Open Source Scouting mark) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <meta
      property="og:description"
      content="A React + Tailwind design system that themes the Scouting America brand and its four programs."
    />
    <meta property="og:image" content="/oss/opensourcescouting-social-preview.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body class="bg-program-surface text-program-on-surface antialiased">
