name: CI

# Guards the design system against regressions: type errors, contrast/axe
# failures, broken library build, or a broken Storybook build. Runs on every
# PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
