name: CI

# Guards the design system against regressions: type errors, contrast failures,
# a11y violations (real-browser axe via @storybook/addon-vitest), broken library
# build, or a broken Storybook build. Runs on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # npm 11 fixes the optional-dependency lockfile bug (npm/cli#4828) that
      # truncated platform-specific native bindings (e.g. oxc-resolver's
      # linux-x64-gnu). Node 22 ships npm 10, so upgrade before any install.
      # Required by engines.npm + .npmrc engine-strict.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint (Prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # The Vitest "storybook" project runs stories as tests in real Chromium
      # (@storybook/addon-vitest), so the browser binary + system deps must be
      # present before `npm run test`.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
