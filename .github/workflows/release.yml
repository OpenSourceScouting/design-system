name: Release

# Deliberate, manually-triggered releases (NOT automatic on merge to main).
#
# Version and changelog truth live outside repository files: the version
# comes from git tags (v*), and the changelog comes from GitHub Releases.
# Merges to main only accumulate Conventional Commit history (via
# squash-merge PR titles, validated by pr-title.yml); nothing publishes on
# merge. When a release is ready, a maintainer runs this workflow from the
# Actions tab:
#
#   1. `verify` re-runs the full CI gate on the exact commit being released.
#   2. `release` (gated by the `npm-publish` environment, which should be
#      configured with a required reviewer and restricted to `main`):
#        a. builds the library
#        b. runs semantic-release, which inspects commits since the last v*
#           tag, computes the next version (fix = patch, feat = minor,
#           feat!/BREAKING CHANGE = major), packs the tarball, publishes to
#           npm with Sigstore provenance, creates the v* tag, and creates the
#           GitHub Release with generated notes (currently under the `alpha`
#           dist-tag and prerelease channel; see ADR 0007)
#        c. generates a CycloneDX SBOM with Syft
#        d. attests the tarball + SBOM (GitHub keyless artifact attestations)
#        e. uploads the tarball and SBOM as assets on the GitHub Release
#
# semantic-release never commits to the repository (no @semantic-release/git
# plugin), so this workflow needs no bypass of branch protection on main.
#
# The `dry-run` input runs verify + build + `semantic-release --dry-run`
# (which prints the computed version and notes without tagging, publishing,
# or releasing anything), and the SBOM/attest/upload steps are skipped since
# there is no tarball to act on.
#
# One-time repository setup this workflow depends on:
#   - an `npm-publish` environment (Settings > Environments) with a required
#     reviewer and deployment branch rule limited to `main`, holding an
#     `NPM_TOKEN` secret (granular npm automation token, publish-only, scoped
#     to @opensourcescouting/design-system)
#   - npm provenance requires this repository to be public on GitHub
#   - see docs/release-migration-plan.md for the remaining one-time setup
#     (branch/tag rulesets, squash-merge settings, trusted publishing)

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Preview the release (build, semantic-release --dry-run) without tagging, publishing, or creating a release"
        type: boolean
        default: false

# Never run two releases at once; a second dispatch waits for the first.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify (full CI gate)
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to release from a non-main ref
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Releases must be dispatched from main (got ${GITHUB_REF})."
          exit 1

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # npm 11 fixes the optional-dependency lockfile bug (npm/cli#4828) that
      # truncated platform-specific native bindings. Required by engines.npm +
      # .npmrc engine-strict; Node 22 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint (Prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

  release:
    name: version, sign, publish
    needs: verify
    runs-on: ubuntu-latest
    # The environment is the human approval gate: configure it with a required
    # reviewer so every publish (and dry-run) gets an explicit confirmation
    # click, and scope NPM_TOKEN to it so PR-triggered workflows can never
    # mount the credential.
    environment: npm-publish
    permissions:
      contents: write # create the v* tag + GitHub Release
      id-token: write # Sigstore keyless signing (npm provenance + attestations)
      attestations: write # GitHub artifact attestations for tarball + SBOM
    outputs:
      released: ${{ steps.result.outputs.released }}
      version: ${{ steps.result.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release walks history + tags

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # npm 11 fixes the optional-dependency lockfile bug (npm/cli#4828) that
      # truncated platform-specific native bindings. Required by engines.npm +
      # .npmrc engine-strict; Node 22 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Build BEFORE semantic-release: the npm plugin packs the tarball
      # during its prepare step and must see dist/.
      - name: Build library
        run: npm run build

      - name: Guard, dispatched from main only
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Releases must be dispatched from main (got ${GITHUB_REF})."
          exit 1

      - name: semantic-release
        run: npx semantic-release ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Detect release result
        id: result
        run: |
          TARBALL=$(ls release-artifacts/*.tgz 2>/dev/null | head -n 1 || true)
          if [ -n "$TARBALL" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No release was produced (dry run, or no releasable commits)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate SBOM (Syft, CycloneDX)
        if: steps.result.outputs.released == 'true'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: design-system-${{ steps.result.outputs.version }}.sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Attest tarball and SBOM
        if: steps.result.outputs.released == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ steps.result.outputs.tarball }}
            design-system-${{ steps.result.outputs.version }}.sbom.cdx.json

      - name: Upload assets to the GitHub Release
        if: steps.result.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.result.outputs.version }}" \
            "${{ steps.result.outputs.tarball }}" \
            "design-system-${{ steps.result.outputs.version }}.sbom.cdx.json"

  # Publish the "latest" Storybook to GitHub Pages after a real release, so the
  # hosted component lab (https://opensourcescouting.github.io/design-system/)
  # matches the version just published to npm. Each deploy overwrites the last;
  # there is no versioned archive (see the plan / ADR backlog if that changes).
  #
  # This lives inside release.yml (rather than a release-triggered pages.yml)
  # because the GitHub Release and tag above are created with GITHUB_TOKEN, and
  # events emitted by GITHUB_TOKEN do not trigger other workflows, so a
  # release-triggered deploy would silently never run.
  #
  # No real BSA marks are deployed: public/marks/ is gitignored, so the CI build
  # ships none. VITE_FORCE_PLACEHOLDER_MARKS=true makes the hosted Storybook
  # render the inline placeholder marks and skip the /marks/ probe entirely (no
  # 404 noise, correct trademark posture). VITE_MARKS_BASE_URL still points at
  # the subpath so a private fork that ships marks and turns the force flag off
  # resolves them correctly.
  deploy-storybook:
    name: deploy Storybook to Pages
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to the Pages site
      id-token: write # OIDC token the deploy-pages action verifies
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Serialize Pages deploys independently of the release concurrency group.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # npm 11 fixes the optional-dependency lockfile bug (npm/cli#4828) that
      # truncated platform-specific native bindings. Required by engines.npm +
      # .npmrc engine-strict; Node 22 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook (Pages subpath)
        run: npm run build-storybook
        env:
          SB_BASE_PATH: /design-system/
          VITE_MARKS_BASE_URL: /design-system/marks/
          VITE_FORCE_PLACEHOLDER_MARKS: "true"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
